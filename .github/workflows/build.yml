name: Build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download PS5 Payload SDK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SDK_URL=$(gh api repos/ps5-payload-dev/sdk/releases/latest \
            --jq '.assets[] | select(.name | endswith(".zip")) | .browser_download_url')
          curl -fsL "$SDK_URL" -o sdk.zip
          unzip -q sdk.zip
          echo "PS5_PAYLOAD_SDK=$PWD/ps5-payload-sdk" >> "$GITHUB_ENV"

      - name: Cross-compile zlib for PS5 target
        run: |
          source "$PS5_PAYLOAD_SDK/toolchain/prospero.sh"
          curl -fsL https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz | tar xz
          cd zlib-1.3.1
          for f in adler32 compress crc32 deflate infback inffast inflate inftrees trees uncompr zutil; do
            $CC -O2 -w -c "${f}.c" -o "${f}.o"
          done
          $AR rcs libz.a \
            adler32.o compress.o crc32.o deflate.o infback.o inffast.o \
            inflate.o inftrees.o trees.o uncompr.o zutil.o
          mkdir -p "$GITHUB_WORKSPACE/zlib-ps5/"{include,lib}
          cp zlib.h zconf.h "$GITHUB_WORKSPACE/zlib-ps5/include/"
          cp libz.a          "$GITHUB_WORKSPACE/zlib-ps5/lib/"
          echo "ZLIB_INCLUDE=$GITHUB_WORKSPACE/zlib-ps5/include" >> "$GITHUB_ENV"
          echo "ZLIB_LIB=$GITHUB_WORKSPACE/zlib-ps5/lib/libz.a"  >> "$GITHUB_ENV"

      - name: Build
        run: make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-compressor
          path: game-compressor.elf
          retention-days: 7
